<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Koda Temple</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;font-size:13px}

  /* ГўВ”ВЂГўВ”ВЂ Header ГўВ”ВЂГўВ”ВЂ */
  #header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;
    border-bottom:1px solid #21262d;background:#161b22;position:sticky;top:0;z-index:10}
  #header h1{font-size:15px;font-weight:600;color:#e6edf3;letter-spacing:.3px}
  #meta{font-size:11px;color:#8b949e}

  /* ГўВ”ВЂГўВ”ВЂ Tabs ГўВ”ВЂГўВ”ВЂ */
  #tabs{display:flex;border-bottom:1px solid #21262d;background:#161b22;padding:0 16px}
  .tab{padding:8px 18px;cursor:pointer;font-size:12px;font-weight:500;color:#8b949e;
    border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
  .tab.active{color:#e6edf3;border-bottom-color:#f78166}
  .tab:hover:not(.active){color:#c9d1d9}

  /* ГўВ”ВЂГўВ”ВЂ Body / Columns ГўВ”ВЂГўВ”ВЂ */
  .tab-pane{display:none}
  .tab-pane.active{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 86px)}
  .col-panel{overflow-y:auto;padding:14px 16px;border-right:1px solid #21262d}
  .col-panel:last-child{border-right:none}

  /* ГўВ”ВЂГўВ”ВЂ Collection header ГўВ”ВЂГўВ”ВЂ */
  .col-head{margin-bottom:14px}
  .col-title{font-size:13px;font-weight:600;color:#e6edf3;margin-bottom:6px}
  .col-stats{display:flex;gap:18px;font-size:11px;color:#8b949e}
  .col-stats span b{color:#c9d1d9}

  /* ГўВ”ВЂГўВ”ВЂ Section ГўВ”ВЂГўВ”ВЂ */
  .section{margin-bottom:18px}
  .section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;
    color:#8b949e;padding:4px 0 6px;border-bottom:1px solid #21262d;margin-bottom:6px}

  /* ГўВ”ВЂГўВ”ВЂ Stock-tracker row ГўВ”ВЂГўВ”ВЂ */
  .row{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:4px;
    border-bottom:1px solid #161b22;transition:background .1s}
  .row:hover{background:#161b22}
  .row-name{flex:1;color:#c9d1d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row-price{font-family:monospace;font-size:12px;color:#e6edf3;white-space:nowrap}
  .row-usd{font-size:11px;color:#8b949e;white-space:nowrap}
  .row-pct{font-size:11px;white-space:nowrap;min-width:52px;text-align:right}
  .pct-pos{color:#3fb950}
  .pct-neg{color:#f85149}
  .pct-neu{color:#8b949e}

  /* ГўВ”ВЂГўВ”ВЂ Tier / env badges ГўВ”ВЂГўВ”ВЂ */
  .badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;
    letter-spacing:.3px;white-space:nowrap}
  .t1{background:#1f3a2d;color:#3fb950}
  .t2{background:#2a2a1a;color:#d4a017}
  .t3{background:#3a1a1a;color:#f85149}
  .t4{background:#1a1a3a;color:#79c0ff}
  .t5{background:#2a1a3a;color:#d2a8ff}
  .env-badge{background:#0d2340;color:#58a6ff}
  .artifact-badge{background:#2a1f3a;color:#d2a8ff}
  .no-data{color:#484f58;font-size:11px;padding:6px 0;font-style:italic}

  /* ГўВ”ВЂГўВ”ВЂ Sales tab: discrepancy section ГўВ”ВЂГўВ”ВЂ */
  .disc-row{display:grid;grid-template-columns:1fr repeat(4,auto);gap:6px;
    align-items:center;padding:5px 6px;border-bottom:1px solid #161b22;border-radius:4px}
  .disc-row:hover{background:#161b22}
  .disc-dir{font-size:10px;color:#8b949e;text-align:center}

  /* ГўВ”ВЂГўВ”ВЂ Scrollbar ГўВ”ВЂГўВ”ВЂ */
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:#0d1117}
  ::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
</style>
</head>
<body>

<div id="header">
  <h1>ГўВ›В© Koda Temple</h1>
  <div id="meta">loadingГўВЂВ¦</div>
</div>

<div id="tabs">
  <div class="tab active" data-tab="resources">Resources</div>
  <div class="tab" data-tab="artifacts">Artifacts</div>
  <div class="tab" data-tab="sales">Sales (10d)</div>
</div>

<div id="resources" class="tab-pane active">
  <div class="col-panel" id="res-otherdeed"></div>
  <div class="col-panel" id="res-expanded"></div>
</div>
<div id="artifacts" class="tab-pane">
  <div class="col-panel" id="art-otherdeed"></div>
  <div class="col-panel" id="art-expanded"></div>
</div>
<div id="sales" class="tab-pane">
  <div class="col-panel" id="sales-otherdeed"></div>
  <div class="col-panel" id="sales-expanded"></div>
</div>

<script>
const DATA_URL = 'https://smokbrain-666.github.io/koda-temple/price_snapshot_latest.json';
const DIRECTIONS = ['Western','Northern','Eastern','Southern'];
const TIER_ORDER = ['1','2','3','4','5'];

/* ГўВ”ВЂГўВ”ВЂ Tabs ГўВ”ВЂГўВ”ВЂ */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
  });
});

/* ГўВ”ВЂГўВ”ВЂ Helpers ГўВ”ВЂГўВ”ВЂ */
function fmt(eth){ return eth != null ? eth.toFixed(4) : 'ГўВЂВ”'; }
function usd(eth, rate){ return eth != null && rate ? '$'+(eth*rate).toFixed(0) : ''; }
function pctBadge(eth, floor){
  if(eth == null || !floor) return '<span class="pct-neu">ГўВЂВ”</span>';
  const p = ((eth/floor)-1)*100;
  const cls = p > 0.5 ? 'pct-pos' : p < -0.5 ? 'pct-neg' : 'pct-neu';
  const sign = p >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${p.toFixed(0)}%</span>`;
}
function tierBadge(t){
  const n = String(t).replace(/[^0-9]/g,'');
  const cls = ['t1','t2','t3','t4','t5'][parseInt(n)-1] || 't1';
  return `<span class="badge ${cls}">T${n}</span>`;
}
function row(name, badge, eth, rate, floor, extra){
  return `<div class="row">
    <span class="row-name">${name}</span>
    ${badge}
    <span class="row-price">${fmt(eth)} ГЋВћ</span>
    <span class="row-usd">${usd(eth,rate)}</span>
    ${pctBadge(eth, floor)}
    ${extra||''}
  </div>`;
}
function section(title, html){
  return `<div class="section"><div class="section-title">${title}</div>${html||'<div class="no-data">No data</div>'}</div>`;
}

/* ГўВ”ВЂГўВ”ВЂ Resources tab ГўВ”ВЂГўВ”ВЂ */
function renderResources(key, label, data, rate, el){
  const col   = data.collection || {};
  const floor = col.floor_eth;
  const rf    = data.resource_floors || {};
  const raw   = data.raw_traits || {};

  let html = colHeader(label, col, rate);

  // Environment Tier
  const envTier = raw['Environment Tier'] || {};
  let envHtml = '';
  Object.entries(envTier).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([name, eth])=>{
    envHtml += row(name, `<span class="badge env-badge">ENV</span>`, eth, rate, floor);
  });
  html += section('Environment Tier', envHtml);

  // Per-direction resource sections
  DIRECTIONS.forEach(dir => {
    const dirData = rf[dir] || {};
    if(!Object.keys(dirData).length) return;
    let dirHtml = '';
    // Sort resources alphabetically, tiers numerically
    Object.entries(dirData).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([resName, tiers])=>{
      TIER_ORDER.forEach(t => {
        if(tiers[t] != null){
          dirHtml += row(resName, tierBadge(t), tiers[t], rate, floor);
        }
      });
    });
    html += section(`${dir} Resources`, dirHtml);
  });

  el.innerHTML = html;
}

/* ГўВ”ВЂГўВ”ВЂ Artifacts tab ГўВ”ВЂГўВ”ВЂ */
function renderArtifacts(key, label, data, rate, el){
  const col   = data.collection || {};
  const floor = col.floor_eth;
  const raw   = data.raw_traits || {};

  let html = colHeader(label, col, rate);

  // Artifact (relic names)
  const artifacts = raw['Artifact'] || {};
  let artHtml = '';
  Object.entries(artifacts).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([name, eth])=>{
    artHtml += row(name, `<span class="badge artifact-badge">Relic</span>`, eth, rate, floor);
  });
  html += section('Artifacts', artHtml);

  // Artifact Tier
  const artTier = raw['Artifact Tier'] || {};
  let atHtml = '';
  TIER_ORDER.forEach(t => {
    if(artTier[t] != null){
      atHtml += row(`Artifact Tier ${t}`, tierBadge(t), artTier[t], rate, floor);
    }
  });
  html += section('Artifact Tier', atHtml);

  el.innerHTML = html;
}

/* ГўВ”ВЂГўВ”ВЂ Sales tab ГўВ”ВЂГўВ”ВЂ */
function renderSales(key, label, data, rate, el){
  const col         = data.collection || {};
  const floor       = col.floor_eth;
  const st          = data.sales_traits || {};
  const rs          = data.resource_sales || {};

  let html = colHeader(label, col, rate);

  // Environment Tier sales
  const envS = st['Environment Tier'] || {};
  let envHtml = '';
  Object.entries(envS).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([name,s])=>{
    envHtml += row(name, `<span class="badge env-badge">ENV</span>`, s.price_eth, rate, floor, tsLabel(s.ts));
  });
  html += section('Environment Tier ГўВЂВ” Last Sold', envHtml);

  // Artifact sales
  const artS = st['Artifact'] || {};
  let artHtml = '';
  Object.entries(artS).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([name,s])=>{
    artHtml += row(name, `<span class="badge artifact-badge">Relic</span>`, s.price_eth, rate, floor, tsLabel(s.ts));
  });
  html += section('Artifacts ГўВЂВ” Last Sold', artHtml);

  // Resource sales per direction
  DIRECTIONS.forEach(dir => {
    const dirData = rs[dir] || {};
    if(!Object.keys(dirData).length) return;
    let dirHtml = '';
    Object.entries(dirData).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([resName, tiers])=>{
      TIER_ORDER.forEach(t => {
        const s = tiers[t];
        if(s){
          dirHtml += row(resName, tierBadge(t), s.price_eth, rate, floor, tsLabel(s.ts));
        }
      });
    });
    html += section(`${dir} Resources ГўВЂВ” Last Sold`, dirHtml);
  });

  el.innerHTML = html;
}

/* ГўВ”ВЂГўВ”ВЂ Discrepancy panel (Sales tab, full-width bottom) ГўВ”ВЂГўВ”ВЂ */
function renderDiscrepancies(snap, rate){
  // Find resource names that appear in multiple directions with different tiers/prices
  // across both collections
  const collections = [
    {key:'otherdeed', label:'OD', data: snap.otherdeed || {}},
    {key:'expanded',  label:'EX', data: snap.expanded  || {}},
  ];
  // Build: resName -> [{dir, tier, price_eth, col}]
  const map = {};
  collections.forEach(c => {
    const rs = c.data.resource_floors || {};
    DIRECTIONS.forEach(dir => {
      const dirData = rs[dir] || {};
      Object.entries(dirData).forEach(([resName, tiers])=>{
        TIER_ORDER.forEach(t => {
          if(tiers[t] != null){
            if(!map[resName]) map[resName] = [];
            map[resName].push({dir, tier:t, price:tiers[t], col:c.label});
          }
        });
      });
    });
  });
  // Only show names with multiple entries (potential discrepancies)
  const disc = Object.entries(map).filter(([,v])=>v.length>1).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!disc.length) return '';
  let html = '<div class="section-title" style="margin:14px 16px 6px">Territory Discrepancies</div>';
  disc.forEach(([resName, entries])=>{
    html += `<div style="padding:4px 16px 2px;font-size:11px;color:#8b949e">${resName}</div>`;
    entries.forEach(e => {
      const usdStr = rate ? ' <span style="color:#8b949e;font-size:11px">$'+(e.price*rate).toFixed(0)+'</span>' : '';
      html += `<div class="row" style="margin:0 8px">
        <span class="row-name" style="color:#8b949e">${e.col} Г‚В· ${e.dir}</span>
        ${tierBadge(e.tier)}
        <span class="row-price">${fmt(e.price)} ГЋВћ</span>${usdStr}
      </div>`;
    });
  });
  return html;
}

/* ГўВ”ВЂГўВ”ВЂ Shared helpers ГўВ”ВЂГўВ”ВЂ */
function colHeader(label, col, rate){
  const f = col.floor_eth;
  const fUsd = f && rate ? ` Г‚В· $${(f*rate).toFixed(0)}` : '';
  return `<div class="col-head">
    <div class="col-title">${label}</div>
    <div class="col-stats">
      <span>Floor <b>${fmt(f)} ГЋВћ${fUsd}</b></span>
      <span>Listed <b>${col.listed ?? 'ГўВЂВ”'}</b></span>
      <span>Owners <b>${col.num_owners ?? 'ГўВЂВ”'}</b></span>
    </div>
  </div>`;
}
function tsLabel(ts){
  if(!ts) return '';
  const d = new Date(ts*1000);
  const diff = Math.round((Date.now()-d)/3600000);
  const label = diff < 24 ? `${diff}h ago` : `${Math.round(diff/24)}d ago`;
  return `<span style="font-size:10px;color:#484f58">${label}</span>`;
}

/* ГўВ”ВЂГўВ”ВЂ Main ГўВ”ВЂГўВ”ВЂ */
fetch(DATA_URL)
  .then(r => r.json())
  .then(snap => {
    const rate = snap.eth_usd;
    const ts   = snap.fetched_at;
    document.getElementById('meta').textContent =
      `Updated ${ts} UTC${rate ? ' Г‚В· $'+rate.toLocaleString()+'/ETH' : ''}`;

    const od = snap.otherdeed || {};
    const ex = snap.expanded  || {};

    renderResources('otherdeed', 'Otherdeed for Otherside', od, rate, document.getElementById('res-otherdeed'));
    renderResources('expanded',  'Otherdeed Expanded',      ex, rate, document.getElementById('res-expanded'));

    renderArtifacts('otherdeed', 'Otherdeed for Otherside', od, rate, document.getElementById('art-otherdeed'));
    renderArtifacts('expanded',  'Otherdeed Expanded',      ex, rate, document.getElementById('art-expanded'));

    renderSales('otherdeed', 'Otherdeed for Otherside', od, rate, document.getElementById('sales-otherdeed'));
    renderSales('expanded',  'Otherdeed Expanded',      ex, rate, document.getElementById('sales-expanded'));

    // Append discrepancy panel to sales pane (spanning both columns)
    const disc = renderDiscrepancies(snap, rate);
    if(disc){
      const salesPane = document.getElementById('sales');
      const discDiv = document.createElement('div');
      discDiv.style.cssText = 'grid-column:1/-1;overflow-y:auto;border-top:1px solid #30363d;padding-bottom:20px';
      discDiv.innerHTML = disc;
      salesPane.appendChild(discDiv);
    }
  })
  .catch(e => {
    document.getElementById('meta').textContent = 'Error loading data';
    console.error(e);
  });
</script>
</body>
</html>
