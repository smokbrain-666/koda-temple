<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KODAQ</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --amber:       #FF7700;
  --amber-bright:#FFAA44;
  --amber-dim:   #FF5500;
  --red-header:  #FF2200;
  --green:       #00FF66;
  --blue:        #44AAFF;
  --white:       #FFFFFF;
  --panel:       #060000;
  --border:      #2A0000;
  --glow-amber:  0 0 8px #FF7700, 0 0 18px rgba(255,120,0,0.6);
  --glow-green:  0 0 8px #00FF66;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: #000 url('kodaq_bg.jpg') center center / cover no-repeat fixed;
  color: var(--amber);
  font-family: 'VT323', 'Courier New', monospace;
  font-size: 20px;
  overflow-x: hidden;
}

/* faint scan-line sweep */
body::after {
  content:'';
  position:fixed;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(transparent,rgba(255,30,0,.07),transparent);
  animation:scan 10s linear infinite;
  pointer-events:none;
  z-index:9999;
}
@keyframes scan { 0%{top:-10px} 100%{top:100vh} }

/* dark overlay so text stays readable */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background: rgba(0,0,0,0.60);
  pointer-events:none;
  z-index:0;
}
#hdr, #tabs, #main-content, footer { position:relative; z-index:1; }

/* ===== HEADER ===== */
#hdr {
  background:linear-gradient(180deg,#0A0A18 0%,#000 100%);
  border-bottom:2px solid var(--amber);
  padding:8px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:200;
}
#hdr-logo {
  font-size:30px;
  letter-spacing:5px;
  color:var(--amber-bright);
  text-shadow:var(--glow-amber);
}
#hdr-meta {
  display:flex;
  gap:20px;
  font-size:18px;
  color:#FF8800;
  white-space:nowrap;
}
#eth-price { color:var(--amber-bright); text-shadow:var(--glow-amber); }
#clock     { color:var(--white); }

/* ===== TICKER TAPE ===== */
#ticker-wrap {
  background:#080000;
  border-bottom:1px solid var(--amber-dim);
  overflow:hidden;
  white-space:nowrap;
  padding:5px 0;
}
#ticker-inner {
  display:inline-block;
  animation:scroll 80s linear infinite;
  font-size:17px;
}
@keyframes scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ti { display:inline-block; margin:0 28px; }
.ti-name { color:var(--amber-bright); letter-spacing:1px; }
.ti-price { color:var(--white); margin-left:6px; }
.ti-sep { color:#444; margin:0 8px; }

/* ===== TABS ===== */
#tabs {
  display:flex;
  background:#050000;
  border-bottom:2px solid var(--amber-dim);
  position:sticky;
  top:55px;
  z-index:199;
}
.tab {
  padding:10px 30px;
  cursor:pointer;
  color:var(--amber-dim);
  font-size:20px;
  letter-spacing:3px;
  border-right:1px solid #1A1A00;
  transition:all .1s;
}
.tab:hover { color:var(--amber); background:#0D0000; }
.tab.active {
  color:var(--amber-bright);
  background:#180000;
  border-bottom:3px solid var(--amber-bright);
  text-shadow:var(--glow-amber);
}

/* ===== CONTENT ===== */
#content { padding:12px 12px 50px; }
.pane { display:none; }
.pane.active { display:block; }

/* ===== 2-COL GRID ===== */
.col-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
@media(max-width:920px){.col-grid{grid-template-columns:1fr;}}

/* ===== COLLECTION SECTION ===== */
.col-section { border:1px solid var(--border); }
.col-hdr {
  background:#0A0000;
  border-bottom:1px solid var(--border);
  padding:7px 14px;
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  align-items:center;
}
.col-name { font-size:19px; color:var(--amber-bright); letter-spacing:2px; text-shadow:var(--glow-amber); }
.col-stat { font-size:16px; color:#FF8800; }
.col-stat .v { color:var(--white); font-size:18px; }

/* ===== CATEGORY BLOCK ===== */
.cat-block { margin-bottom:1px; }
.cat-hdr {
  background:var(--red-header);
  padding:6px 14px;
  display:flex;
  gap:14px;
  align-items:baseline;
}
.cat-title {
  font-size:26px;
  color:var(--amber-bright);
  letter-spacing:4px;
  text-shadow:0 0 8px rgba(255,150,0,.8);
}
.cat-sub { font-size:15px; color:rgba(255,170,0,1); letter-spacing:1px; }

/* ===== MARKET TABLE ===== */
.mkt-table {
  width:100%;
  border-collapse:collapse;
  background:var(--panel);
}
.mkt-table thead tr { background:#0D0000; border-bottom:1px solid var(--border); }
.mkt-table th {
  padding:7px 12px;
  font-size:15px;
  color:#FF9900;
  letter-spacing:1px;
  font-weight:normal;
  text-align:left;
}
.mkt-table th.r { text-align:right; }
.mkt-table tbody tr { border-bottom:1px solid #1A1500; transition:background .1s; }
.mkt-table tbody tr:hover { background:#0D0000; }
.mkt-table td { padding:10px 12px; }

.sym {
  color:var(--amber-bright);
  font-size:23px;
  letter-spacing:2px;
  text-shadow:0 0 5px rgba(255,150,0,.6);
}
.dirs { display:flex; gap:3px; flex-wrap:wrap; }
.dir-tag {
  font-size:11px;
  padding:1px 5px;
  border:1px solid var(--blue);
  color:var(--blue);
  opacity:.7;
}

/* tier columns */
.t1c { text-align:right; }
.t2c { text-align:right; }
.t3c { text-align:right; }

.eth-val { color:var(--amber-bright); font-size:23px; white-space:nowrap; text-shadow:var(--glow-amber); }
.usd-val { color:#FFAA00; font-size:16px; display:block; text-align:right; }
.no-data { color:#FF9900; font-size:17px; text-align:right; }

/* tier badges â T1=red(base/cheap) T2=orange(mid) T3=green(premium) */
.tb { display:inline-block; padding:2px 8px; font-size:15px; border:1px solid; margin-right:2px; }
.t1 { color:#FF5500; border-color:#FF5500; text-shadow:0 0 6px #FF5500; }
.t2 { color:#FF8800; border-color:#FF8800; text-shadow:0 0 6px #FF8800; }
.t3 { color:#00FF66; border-color:#00FF66; text-shadow:var(--glow-green); }

/* league table */
.league-table { width:100%; border-collapse:collapse; background:var(--panel); }
.league-table thead tr { background:#0D0000; border-bottom:2px solid var(--border); }
.league-table th { padding:8px 14px; font-size:16px; color:#FF9900; letter-spacing:1px; font-weight:normal; text-align:left; }
.league-table th.r { text-align:right; }
.league-table tbody tr { border-bottom:1px solid #1A0500; transition:background .1s; }
.league-table tbody tr:hover { background:#0D0000; }
.league-table td { padding:10px 14px; }
.rank-gold   { color:#FFD700; font-size:26px; font-weight:bold; text-shadow:0 0 10px #FFD700; }
.rank-silver { color:#C0C0C0; font-size:26px; font-weight:bold; text-shadow:0 0 8px #C0C0C0; }
.rank-bronze { color:#CD7F32; font-size:26px; font-weight:bold; text-shadow:0 0 8px #CD7F32; }
.rank-rest   { color:#FF9900; font-size:24px; }
.type-res  { color:#FFAA00; border:1px solid #FFAA00; padding:1px 6px; font-size:13px; }
.type-art  { color:#CC66FF; border:1px solid #CC66FF; padding:1px 6px; font-size:13px; }
.type-koda { color:#00CCFF; border:1px solid #00CCFF; padding:1px 6px; font-size:13px; }
.col-badge { font-size:13px; color:#FF8800; border:1px solid #AA4400; padding:1px 5px; }
.league-hdr { background:#001A00; }
.tier-badge-sm { font-size:13px; padding:1px 5px; border:1px solid; }

/* pending notice */
.pending-notice {
  padding:5px 14px;
  font-size:13px;
  color:#FF9900;
  border-bottom:1px solid var(--border);
}

/* ===== STATUS BAR ===== */
#status-bar {
  position:fixed;
  bottom:0;left:0;right:0;
  background:#040000;
  border-top:1px solid var(--amber-dim);
  padding:5px 16px;
  display:flex;
  justify-content:space-between;
  font-size:16px;
  color:#FF8800;
  z-index:200;
}
#live-dot {
  display:inline-block;
  width:7px;height:7px;
  background:var(--green);
  border-radius:50%;
  margin-right:5px;
  animation:blink 1.8s ease-in-out infinite;
  box-shadow:var(--glow-green);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.loading {
  text-align:center;
  padding:60px;
  color:var(--amber);
  font-size:26px;
  animation:blink 1s step-end infinite;
}

/* artifact purple header */
.art-hdr { background:#440055; }

/* sales orange header */
.sales-hdr { background:#553300; }

/* sale price vs floor indicators */
.sale-up { color:#00FF44; font-size:16px; display:block; line-height:1.4; font-weight:bold; text-shadow:0 0 8px #00FF44, 0 0 2px #00FF44; }
.sale-dn { color:#FF5555; font-size:16px; display:block; line-height:1.4; font-weight:bold; text-shadow:0 0 8px #FF5555, 0 0 2px #FF5555; }
.sale-eq { color:#999;    font-size:15px; display:block; line-height:1.4; }
.chg-up  { color:#00FF44; font-size:18px; display:inline-block; text-shadow:0 0 8px #00FF44; }
.chg-dn  { color:#FF5555; font-size:18px; display:inline-block; text-shadow:0 0 8px #FF5555; }
.chg-eq  { color:#666;    font-size:15px; display:inline-block; }

/* === KODAQ DASHBOARD VISUAL OVERRIDES (v2 cosmic 2026-05-08) === */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');
:root {
  --neon-blue:    #00E1FF;
  --neon-cyan:    #00FFE1;
  --neon-green:   #2BFF66;
  --blood-red:    #C40000;
  --bright-yellow:#FFE600;
  --pure-white:   #FFFFFF;
  --cosmic-purple:#B57BFF;

  --glow-white:   0 0 8px #FFFFFF, 0 0 18px rgba(255,255,255,0.95), 0 0 32px rgba(255,255,255,0.65);
  --glow-blue:    0 0 8px #00E1FF, 0 0 18px rgba(0,225,255,0.95), 0 0 32px rgba(0,225,255,0.6), 0 0 50px rgba(181,123,255,0.4);
  --glow-green-x: 0 0 8px #2BFF66, 0 0 18px rgba(43,255,102,0.9),  0 0 32px rgba(43,255,102,0.55);
  --glow-red-x:   0 0 8px #C40000, 0 0 18px rgba(196,0,0,0.95),    0 0 32px rgba(196,0,0,0.6);
  --glow-yellow-x:0 0 8px #FFE600, 0 0 18px rgba(255,230,0,0.95),  0 0 32px rgba(255,230,0,0.6);
  --glow-cosmic:  0 0 8px #B57BFF, 0 0 22px rgba(181,123,255,0.85),0 0 36px rgba(255,60,224,0.5);
}
@keyframes kodaq-pulse {
  0%, 100% { text-shadow: var(--glow-white), 0 0 50px rgba(181,123,255,0.5); }
  50% { text-shadow: 0 0 14px #FFFFFF, 0 0 30px rgba(255,255,255,1), 0 0 60px rgba(181,123,255,0.85), 0 0 90px rgba(255,60,224,0.55); }
}
@keyframes holo-shimmer {
  0%, 100% { filter: brightness(1.0); }
  50% { filter: brightness(1.18); }
}

@keyframes lm-bounce { 0%,100% { transform: translateY(0); opacity:1; } 50% { transform: translateY(-6px); opacity:.7; } }
@keyframes lm-pulse  { 0%,100% { text-shadow: var(--glow-green-x); } 50% { text-shadow: 0 0 14px #2BFF66, 0 0 30px rgba(43,255,102,0.95), 0 0 46px rgba(43,255,102,0.7); } }

}

.tab, .col-hdr, .league-hdr, .art-hdr, .sales-hdr, .cat-hdr, .col-badge, .cat-sub,

.no-data, .pending-notice, .cat-name {

}
.col-stat, .eth-val, .usd-val, .ti-price, #hdr-meta, #hdr-meta span,
.sale-up, .sale-dn, .chg-up, .chg-dn, .sale-eq, .chg-eq,
.lg-total, .lg-count,
.rank-gold, .rank-silver, .rank-bronze, .rank-rest {
  filter: brightness(0.83) !important;
}

/* === KODAQ v5 sharpen text + data (halved blur, text-stroke, weight 900) === */
* { text-rendering: geometricPrecision !important; -webkit-font-smoothing: antialiased !important; -moz-osx-font-smoothing: grayscale !important; }

#hdr-logo {
  text-shadow: 0 0 4px #FFFFFF, 0 0 9px rgba(255,255,255,1), 0 0 16px rgba(255,255,255,0.65), 0 0 25px rgba(181,123,255,0.5) !important;
  -webkit-text-stroke: 1px #FFFFFF !important;
  font-weight: 900 !important;
}
.col-name, .sym, .cat-title, .type-res, .type-art, .type-koda {
  text-shadow: 0 0 2px #FFFFFF, 0 0 4px rgba(255,255,255,1), 0 0 9px rgba(255,255,255,0.6) !important;
  -webkit-text-stroke: 0.4px currentColor !important;
  font-weight: 900 !important;
}

<script>
const DATA_URL = 'https://smokbrain-666.github.io/koda-temple/price_snapshot_latest.json';
const DIRS = ['Western','Northern','Eastern','Southern'];
const DS  = {Western:'W',Northern:'N',Eastern:'E',Southern:'S'};

// Resource -> category mapping (74 resources per OSWiki)
const RES_CAT = {
  // SHARD (8)
  Bonestone:'SHARD', Brimstone:'SHARD', Kinsoul:'SHARD', Luster:'SHARD',
  Moldium:'SHARD', Oblivion:'SHARD', Omni:'SHARD', Runa:'SHARD',
  // ROOT (8)
  Lumileaf:'ROOT', Lunarian:'ROOT', Nether:'ROOT', Petrified:'ROOT',
  Psychosilk:'ROOT', Spikeweed:'ROOT', Void:'ROOT', Whisper:'ROOT',
  // ORE (29)
  Amberskull:'ORE', Aurelian:'ORE', Brineslime:'ORE', Bubonium:'ORE',
  Chlorocite:'ORE', Chroma:'ORE', Claymer:'ORE', Dimensional:'ORE',
  Entradium:'ORE', Entropy:'ORE', Geopillar:'ORE', Hollowcine:'ORE',
  Lapidite:'ORE', Luminite:'ORE', Mallo:'ORE', Mossmoon:'ORE',
  Nocturna:'ORE', Nucleod:'ORE', Onyx:'ORE', Phantom:'ORE',
  Pyrum:'ORE', Ragnarock:'ORE', Shatterfrost:'ORE', Spiritseep:'ORE',
  Stonecrop:'ORE', Tanglevine:'ORE', Tantalite:'ORE', Thermodite:'ORE',
  Vaporhaze:'ORE',
  // ANIMA (29)
  Abyssia:'ANIMA', Coralia:'ANIMA', Degradia:'ANIMA', Durinia:'ANIMA',
  Duskia:'ANIMA', 'Element 115':'ANIMA', Etheria:'ANIMA', Fortuna:'ANIMA',
  Fossica:'ANIMA', Fragmentia:'ANIMA', Galactica:'ANIMA', Gloomia:'ANIMA',
  Glowpod:'ANIMA', Magentia:'ANIMA', Maltosia:'ANIMA', Nebula:'ANIMA',
  Obsilica:'ANIMA', Opalia:'ANIMA', Pricklia:'ANIMA', Prysmatica:'ANIMA',
  Rotworth:'ANIMA', Scholara:'ANIMA', Scumbria:'ANIMA', Senticybia:'ANIMA',
  Slaglia:'ANIMA', Slushia:'ANIMA', Sporicite:'ANIMA', Steppesalt:'ANIMA',
  Sulfirica:'ANIMA',
};
const CAT_ORDER = ['SHARD','ROOT','ORE','ANIMA'];
const CAT_DESC  = {
  SHARD:'CRYSTAL &amp; ENERGY',
  ROOT: 'BOTANICAL &amp; EARTH',
  ORE:  'MINERAL &amp; STONE',
  ANIMA:'LIVING &amp; ORGANIC',
};

// Artifact tier display
const ART_TIERS = ['Artefact','Relic','Mythic'];
const ART_TIER_CLS = {Artefact:'t1',Relic:'t2',Mythic:'t3'};
const ART_TIER_LBL = {Artefact:'T1',Relic:'T2',Mythic:'T3'};

// ---- helpers ----
function fe(p){ return p==null?null:p.toFixed(4)+' &#926;'; }
function fu(p,r){
  if(p==null||r==null) return null;
  const v=p*r;
  return v>=1000?'$'+(v/1000).toFixed(1)+'K':'$'+v.toFixed(0);
}

// Build {cat:{name:{tiers:{t:price},dirs:Set}}} from resource_floors
function buildMatrix(rf){
  const m={};
  for(const dir of DIRS){
    const dd=rf[dir]||{};
    for(const [name,tiers] of Object.entries(dd)){
      const cat=RES_CAT[name]||'OTHER';
      if(!m[cat]) m[cat]={};
      if(!m[cat][name]) m[cat][name]={tiers:{},dirs:new Set()};
      m[cat][name].dirs.add(DS[dir]);
      for(const [t,p] of Object.entries(tiers)){
        if(m[cat][name].tiers[t]==null||p<m[cat][name].tiers[t])
          m[cat][name].tiers[t]=p;
      }
    }
  }
  return m;
}

// Fallback from raw_traits when no resource_floors
function buildMatrixRaw(raw){
  const m={};
  for(const dir of DIRS){
    const dd=raw[dir+' Resource']||{};
    for(const [name,price] of Object.entries(dd)){
      const cat=RES_CAT[name]||'OTHER';
      if(!m[cat]) m[cat]={};
      if(!m[cat][name]) m[cat][name]={tiers:{'?':price},dirs:new Set()};
      else if(price<m[cat][name].tiers['?']) m[cat][name].tiers['?']=price;
      m[cat][name].dirs.add(DS[dir]);
    }
  }
  return m;
}

// Build {name:{tier:{price_eth,ts}}} from resource_sales -- most recent sale per tier
function buildSalesMatrix(rs){
  const m={};
  for(const dir of DIRS){
    const dd=rs[dir]||{};
    for(const [name,tiers] of Object.entries(dd)){
      if(!m[name]) m[name]={};
      for(const [t,sale] of Object.entries(tiers)){
        if(!m[name][t]||sale.ts>m[name][t].ts) m[name][t]=sale;
      }
    }
  }
  return m;
}

// ---- RESOURCES tab ----
function renderResources(data){
  const ethUsd=data.eth_usd;
  const COLS=[
    {key:'otherdeed',label:'OTHERDEED FOR OTHERSIDE'},
    {key:'expanded', label:'OTHERDEED EXPANDED'},
  ];
  let html='<div class="col-grid">';
  for(const col of COLS){
    const cd=data[col.key]||{};
    const rf=cd.resource_floors||{};
    const raw=cd.raw_traits||{};
    const rs=cd.resource_sales||{};
    const st=cd.collection||{};
    const hasFloors=Object.keys(rf).length>0;
    const matrix=hasFloors?buildMatrix(rf):buildMatrixRaw(raw);
    const salesMatrix=buildSalesMatrix(rs);

    html+=`<div class="col-section">
      <div class="col-hdr">
        <span class="col-name">${col.label}</span>
        <span class="col-stat">FLOOR <span class="v">${st.floor_eth?st.floor_eth.toFixed(4)+' &#926;':'---'}</span></span>
        <span class="col-stat">LISTED <span class="v">${st.listed??'---'}</span></span>
      </div>`;

    if(!hasFloors){
      html+=`<div class="pending-notice">// TIER DATA PENDING &mdash; SHOWING BEST FLOOR PRICES</div>`;
    }

    for(const cat of CAT_ORDER){
      const cd2=matrix[cat];
      if(!cd2||!Object.keys(cd2).length) continue;
      // Sort by cheapest floor price (T1 first, fallback to any tier), then alpha
      const names=Object.keys(cd2).sort((a,b)=>{
        const ta=cd2[a].tiers, tb=cd2[b].tiers;
        const pa=ta['1']??ta['2']??ta['3']??Math.min(...Object.values(ta).filter(v=>v!=null));
        const pb=tb['1']??tb['2']??tb['3']??Math.min(...Object.values(tb).filter(v=>v!=null));
        return (pa||999)-(pb||999);
      });
      html+=`<div class="cat-block">
        <div class="cat-hdr">
          <span class="cat-title">${cat}</span>
          <span class="cat-sub">${CAT_DESC[cat]} &nbsp;// ${names.length} RESOURCES</span>
        </div>
        <table class="mkt-table"><thead><tr>
          <th>SYMBOL</th><th>DIRS</th>`;
      if(hasFloors){
        html+=`<th class="r"><span class="tb t1">T1</span></th>
               <th class="r"><span class="tb t2">T2</span></th>
               <th class="r"><span class="tb t3">T3</span></th>`;
      } else {
        html+=`<th class="r">FLOOR</th>`;
      }
      html+=`</tr></thead><tbody>`;

      for(const name of names){
        const e=cd2[name];
        html+=`<tr><td class="sym">${name.toUpperCase()}</td>
          <td><div class="dirs">`;
        for(const d of [...e.dirs].sort())
          html+=`<span class="dir-tag">${d}</span>`;
        html+=`</div></td>`;

        if(hasFloors){
          for(const t of ['1','2','3']){
            const p=e.tiers[t];
            html+=`<td class="${t==='1'?'t1c':t==='2'?'t2c':'t3c'}">`;
            if(p!=null){
              html+=`<span class="eth-val">${fe(p)}</span>`;
              if(ethUsd) html+=`<span class="usd-val">${fu(p,ethUsd)}</span>`;
              // sale comparison: floor vs last sale shows market direction
              const saleEntry=salesMatrix[name]?.[t];
              if(saleEntry){
                const sp=saleEntry.price_eth;
                const diff=p-sp;
                const pct=Math.abs(diff/p*100).toFixed(1);
                if(diff>0.0001){
                  html+=`<span class="sale-up">&#9650; ${fe(sp)} (+${pct}%)</span>`;
                } else if(diff<-0.0001){
                  html+=`<span class="sale-dn">&#9660; ${fe(sp)} (-${pct}%)</span>`;
                } else {
                  html+=`<span class="sale-eq">&#9644; ${fe(sp)}</span>`;
                }
              }
            } else { html+=`<span class="no-data">--</span>`; }
            html+=`</td>`;
          }
        } else {
          const p=e.tiers['?'];
          html+=`<td>`;
          if(p!=null){
            html+=`<span class="eth-val">${fe(p)}</span>`;
            if(ethUsd) html+=`<span class="usd-val">${fu(p,ethUsd)}</span>`;
          } else { html+=`<span class="no-data">--</span>`; }
          html+=`</td>`;
        }
        html+=`</tr>`;
      }
      html+=`</tbody></table></div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  document.getElementById('resources').innerHTML=html;
}

// ---- ARTIFACTS tab ----
function renderArtifacts(data){
  const ethUsd=data.eth_usd;
  const COLS=[
    {key:'otherdeed',label:'OTHERDEED FOR OTHERSIDE'},
    {key:'expanded', label:'OTHERDEED EXPANDED'},
  ];
  let html='<div class="col-grid">';
  for(const col of COLS){
    const cd=data[col.key]||{};
    const raw=cd.raw_traits||{};
    const st=cd.collection||{};
    // Sales data has last-sale prices; raw_traits has floor prices if artifact was in cheapest 50 listed
    const artSales=(cd.sales_traits||{})['Artifact']||{};
    const artFloors=raw['Artifact']||{};
    const allNames=new Set([...Object.keys(artSales),...Object.keys(artFloors)]);

    html+=`<div class="col-section">
      <div class="col-hdr">
        <span class="col-name">${col.label}</span>
        <span class="col-stat">FLOOR <span class="v">${st.floor_eth?st.floor_eth.toFixed(4)+' &#926;':'---'}</span></span>
        <span class="col-stat">ARTIFACTS <span class="v">${allNames.size||'---'}</span></span>
      </div>`;

    if(!allNames.size){
      html+=`<div style="padding:24px;text-align:center;color:#FF9900;font-size:18px">NO ARTIFACT DATA IN WINDOW</div>`;
    } else {
      // Build combined list
      const rows=[];
      for(const name of allNames){
        const s=artSales[name];   // {price_eth, ts}
        const f=artFloors[name];  // number or null
        rows.push({name, saleP:s?.price_eth??null, floorP:f??null});
      }
      rows.sort((a,b)=>{
        const pa=a.saleP??a.floorP??999;
        const pb=b.saleP??b.floorP??999;
        return pa-pb;
      });

      html+=`<div class="cat-block">
        <div class="cat-hdr art-hdr">
          <span class="cat-title">ALL ARTIFACTS</span>
          <span class="cat-sub">${rows.length} TYPES &nbsp;// LAST SALE + FLOOR</span>
        </div>
        <table class="mkt-table"><thead><tr>
          <th>ARTIFACT</th>
          <th class="r">LAST SALE</th>
          <th class="r">FLOOR</th>
          <th class="r">CHG</th>
          <th class="r">USD</th>
        </tr></thead><tbody>`;

      for(const {name,saleP,floorP} of rows){
        // Change indicator: floor vs last sale
        let chgHtml='<span class="chg-eq">&#9644;</span>';
        if(floorP!=null&&saleP!=null){
          const diff=floorP-saleP;
          const pct=Math.abs(diff/floorP*100).toFixed(1);
          if(diff>0.0001)      chgHtml=`<span class="chg-up">&#9650; +${pct}%</span>`;
          else if(diff<-0.0001) chgHtml=`<span class="chg-dn">&#9660; -${pct}%</span>`;
        } else if(floorP==null&&saleP!=null){ chgHtml='<span class="chg-eq">NO LIST</span>'; }
          else if(floorP!=null&&saleP==null){ chgHtml='<span class="chg-eq">NO SALE</span>'; }

        const dispP=floorP??saleP;
        html+=`<tr>
          <td class="sym" style="font-size:18px">${name.toUpperCase()}</td>
          <td class="r">${saleP!=null?`<span class="eth-val">${fe(saleP)}</span>`:'<span class="no-data">--</span>'}</td>
          <td class="r">${floorP!=null?`<span class="eth-val">${fe(floorP)}</span>`:'<span class="no-data">--</span>'}</td>
          <td class="r">${chgHtml}</td>
          <td class="r">${dispP!=null&&ethUsd?`<span class="eth-val" style="font-size:17px">${fu(dispP,ethUsd)}</span>`:''}</td>
        </tr>`;
      }
      html+=`</tbody></table></div>`;

      // Also show KODA if present in sales
      const kodaSales=(cd.sales_traits||{})['Koda'];
      if(kodaSales){
        html+=`<div class="cat-block">
          <div class="cat-hdr art-hdr">
            <span class="cat-title">KODA</span>
            <span class="cat-sub">LAST SALE PRICES</span>
          </div>
          <table class="mkt-table"><thead><tr>
            <th>TYPE</th><th class="r">LAST SALE</th><th class="r">USD</th>
          </tr></thead><tbody>`;
        const kodaRows=Object.entries(kodaSales).sort((a,b)=>a[1].price_eth-b[1].price_eth);
        for(const [name,s] of kodaRows){
          html+=`<tr>
            <td class="sym" style="font-size:18px">${name.toUpperCase()}</td>
            <td class="r"><span class="eth-val">${fe(s.price_eth)}</span></td>
            <td class="r">${ethUsd?`<span class="eth-val" style="font-size:17px">${fu(s.price_eth,ethUsd)}</span>`:''}</td>
          </tr>`;
        }
        html+=`</tbody></table></div>`;
      }
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  document.getElementById('artifacts').innerHTML=html;
}

// ---- SALES tab ----
function renderSales(data){
  const ethUsd=data.eth_usd;
  const COLS=[
    {key:'otherdeed',label:'OTHERDEED FOR OTHERSIDE'},
    {key:'expanded', label:'OTHERDEED EXPANDED'},
  ];
  let html='<div class="col-grid">';
  for(const col of COLS){
    const cd=data[col.key]||{};
    const st=cd.collection||{};
    const salesT=cd.sales_traits||{};
    const resSales=cd.resource_sales||{};

    html+=`<div class="col-section">
      <div class="col-hdr">
        <span class="col-name">${col.label}</span>
        <span class="col-stat">LAST 10 DAYS</span>
      </div>`;

    const hasRS=Object.keys(resSales).length>0;
    const hasST=Object.keys(salesT).length>0;

    if(!hasRS&&!hasST){
      html+=`<div style="padding:30px;text-align:center;color:#FF9900;font-size:18px">
        NO SALES DATA IN WINDOW<br>
        <span style="font-size:14px;color:#FFBB00">NO SALES RECORDED IN LAST 10 DAYS</span>
      </div>`;
    } else {
      // Resource sales by category
      if(hasRS){
        const matrix=buildMatrix(resSales);
        html+=`<div class="cat-block">
          <div class="cat-hdr sales-hdr">
            <span class="cat-title">RESOURCE SALES</span>
            <span class="cat-sub">LAST SOLD PRICE &nbsp;// 10D</span>
          </div>
          <table class="mkt-table"><thead><tr>
            <th>SYMBOL</th><th>CAT</th>
            <th class="r"><span class="tb t1">T1</span></th>
            <th class="r"><span class="tb t2">T2</span></th>
            <th class="r"><span class="tb t3">T3</span></th>
          </tr></thead><tbody>`;
        for(const cat of CAT_ORDER){
          const cd2=matrix[cat];
          if(!cd2) continue;
          for(const [name,e] of Object.entries(cd2).sort()){
            html+=`<tr><td class="sym">${name.toUpperCase()}</td>
              <td style="color:var(--amber-dim);font-size:13px">${cat}</td>`;
            for(const t of ['1','2','3']){
              const entry=e.tiers[t];
              html+=`<td class="r">`;
              if(entry!=null){
                const p=typeof entry==='object'?entry.price_eth:entry;
                html+=`<span class="eth-val">${fe(p)}</span>`;
                if(ethUsd) html+=`<span class="usd-val">${fu(p,ethUsd)}</span>`;
              } else { html+=`<span class="no-data">--</span>`; }
              html+=`</td>`;
            }
            html+=`</tr>`;
          }
        }
        html+=`</tbody></table></div>`;
      }

      // Artifact sales
      if(hasST&&salesT['Artifact']){
        const sorted=Object.entries(salesT['Artifact']).sort((a,b)=>a[1].price_eth-b[1].price_eth);
        html+=`<div class="cat-block">
          <div class="cat-hdr sales-hdr">
            <span class="cat-title">ARTIFACT SALES</span>
            <span class="cat-sub">LAST SOLD PRICE &nbsp;// 10D</span>
          </div>
          <table class="mkt-table"><thead><tr>
            <th>ARTIFACT</th><th class="r">LAST SALE</th><th class="r">USD</th>
          </tr></thead><tbody>`;
        for(const [name,s] of sorted){
          html+=`<tr>
            <td class="sym">${name.toUpperCase()}</td>
            <td class="r"><span class="eth-val">${fe(s.price_eth)}</span></td>
            <td class="r">`;
          if(ethUsd) html+=`<span class="eth-val" style="font-size:17px">${fu(s.price_eth,ethUsd)}</span>`;
          html+=`</td></tr>`;
        }
        html+=`</tbody></table></div>`;
      }
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  document.getElementById('sales').innerHTML=html;
}

// ---- LEAGUE tab ----
function renderLeague(data){
  const ethUsd=data.eth_usd;
  const entries=[];

  const TIER_CLS={'1':'t1','2':'t2','3':'t3'};

  for(const [colKey,colShort] of [['otherdeed','OD'],['expanded','ODE']]){
    const cd=data[colKey]||{};
    const salesT=cd.sales_traits||{};
    const resSales=cd.resource_sales||{};

    // Resources â per tier entry
    for(const dir of DIRS){
      for(const [name,tiers] of Object.entries(resSales[dir]||{})){
        const cat=RES_CAT[name]||'OTHER';
        for(const [tier,sale] of Object.entries(tiers)){
          // dedupe: keep highest price entry for same name+tier+col
          const key=colKey+'|res|'+name+'|'+tier;
          const ex=entries.find(e=>e._key===key);
          if(!ex) entries.push({_key:key,name:name.toUpperCase(),type:'RES',cat,tier,col:colShort,price:sale.price_eth,ts:sale.ts});
          else if(sale.price_eth>ex.price){ ex.price=sale.price_eth; ex.ts=sale.ts; }
        }
      }
    }
    // Artifacts
    for(const [name,sale] of Object.entries(salesT['Artifact']||{})){
      const key=colKey+'|art|'+name;
      const ex=entries.find(e=>e._key===key);
      if(!ex) entries.push({_key:key,name:name.toUpperCase(),type:'ART',cat:'ARTIFACT',tier:null,col:colShort,price:sale.price_eth,ts:sale.ts});
      else if(sale.price_eth>ex.price){ ex.price=sale.price_eth; ex.ts=sale.ts; }
    }
    // Koda
    for(const [name,sale] of Object.entries(salesT['Koda']||{})){
      const key=colKey+'|koda|'+name;
      const ex=entries.find(e=>e._key===key);
      if(!ex) entries.push({_key:key,name:name.toUpperCase(),type:'KODA',cat:'KODA',tier:null,col:colShort,price:sale.price_eth,ts:sale.ts});
      else if(sale.price_eth>ex.price){ ex.price=sale.price_eth; ex.ts=sale.ts; }
    }
  }

  entries.sort((a,b)=>b.price-a.price);
  const top=entries.slice(0,20);

  if(!top.length){
    document.getElementById('league').innerHTML<`<div style="padding:60px;text-align:center;color:#FF9900;font-size:20px">NO SALES DATA AVAILABLE</div>`;
    return;
  }

  function rankHtml(i){
    if(i===0) return `<span class="rank-gold">#1</span>`;
    if(i===1) return `<span class="rank-silver">#2</span>`;
    if(i===2) return `<span class="rank-bronze">#3</span>`;
    return `<span class="rank-rest">#${i+1}</span>`;

  function typeHtml(t){
    if(t==='RES')  return `<span class="type-res">RES</span>`;
    if(t==='ART')  return `<span class="type-art">ART</span>`;
    return `<span class="type-koda">KODA</span>`;
  }
  function tierHtml(tier){
    if(!tier) return '';
    const cls=TIER_CLS[tier]||'';
    return `<span class="tier-badge-sm ${cls}" style="border-color:currentColor">T${tier}</span>`;
  }
  function timeAgo(ts){
    if(!ts) return '--';
    const s=Math.floor(Date.now()/1000)-ts;
    if(s<3600) return Math.floor(s/60)+'m ago';
    if(s<86400) return Math.floor(s/3600)+'h ago';
    return Math.floor(s/86400)+'d ago';
  }

  let html=`
  <div style="padding:0 0 6px">
    <div class="cat-hdr league-hdr" style="border-bottom:2px solid #00FF66;padding:10px 18px;display:flex;gap:14px;align-items:baseline">
      <span class="cat-title" style="color:#00FF66;text-shadow:var(--glow-green)">&#9650; TOP ${top.length} SALES</span>
      <span class="cat-sub" style="color:rgba(0,255,102,.55)">BOTH COLLECTIONS &nbsp;// LAST 10 DAYS &nbsp;// RANKED BY PRICE</span>
    </div>
    <table class="league-table">
      <thead><tr>
        <th style="width:50px">RNK</th>
        <th>ITEM</th>
        <th>TYPE</th>
        <th>CAT</th>
        <th>TIER</th>
        <th>COL</th>
        <th class="r">PRICE</th>
        <th class="r">USD</th>
        <th class="r">SOLD</th>
      </tr></thead>
      <tbody>`;

  for(let i=0;i<top.length;i++){
    const e=top[i];
    const rowStyle=i<3?'border-bottom:1px solid #1A0500;background:#0A0500':'';
    html+=`<tr style="${rowStyle}">
      <td>${rankHtml(i)}</td>
      <td class="sym" style="font-size:${i<3?'22px':'19px'}">${e.name}</td>
      <td>${typeHtml(e.type)}</td>
      <td style="color:#FFAA00;font-size:14px">${e.cat}</td>
      <td>${tierHtml(e.tier)}</td>
      <td><span class="col-badge">${e.col}</span></td>
      <td class="r"><span class="eth-val" style="font-size:${i<3?'22px':'19px'}">${fe(e.price)}</span></td>
      <td class="r">${ethUsd?`<span class="usd-val" style="font-size:16px;display:inline">${fu(e.price,ethUsd)}</span>`:''}</td>
      <td class="r" style="color:#FF9900;font-size:14px">${timeAgo(e.ts)}</td>
    </tr>`;
  }

  html+=`</tbody></table>
  </div>
  <div style="padding:8px 18px;font-size:14px;color:#FF9900;border-top:1px solid #551100">
    &#9650; TIER GUIDE: <span class="tb t1" style="font-size:12px">T1</span> BASE &nbsp;

    ENVIRONMENT TIER DRIVES RESOURCE VALUE: HIGHER ENV = HIGHER DEMAND
  </div>`;

  document.getElementById('league').innerHTML=html;
}

// ---- TICKER ----
function buildTicker(data){
  const items=[];
  for(const colKey of ['otherdeed','expanded']){
    const cd=data[colKey]||{};
    const rf=cd.resource_floors||{};
    const raw=cd.raw_traits||{};
    const st=cd.collection||{};
    const short=colKey==='otherdeed'?'OD':'ODE';
    if(st.floor_eth) items.push([short+' FLOOR', st.floor_eth]);
    const hasFloors=Object.keys(rf).length>0;
    if(hasFloors){
      for(const dir of DIRS){
        for(const [name,tiers] of Object.entries(rf[dir]||{})){
          const minP=Math.min(...Object.values(tiers));
          items.push([name.toUpperCase().substring(0,8), minP]);
        }
      }
    } else {
      for(const dir of DIRS){
        for(const [name,p] of Object.entries(raw[dir+' Resource']||{})){
          items.push([name.toUpperCase().substring(0,8), p]);
        }
      }
    }
    // Artifacts
    for(const [name,p] of Object.entries(raw['Artifact']||{})){
      items.push(['ART:'+name.substring(0,6).toUpperCase(), p]);
    }
  }
  const el=document.getElementById('ticker-inner');
  if(!items.length){ el.innerHTML='LOADING MARKET DATA...'; return; }
  // dedupe
  const seen=new Set();
  const uniq=items.filter(([n])=>{ if(seen.has(n)) return false; seen.add(n); return true; });
  let html='';
  for(const [name,p] of uniq){
    html+=`<span class="ti"><span class="ti-name">${name}</span><span class="ti-price">${p.toFixed(4)} &#926;</span></span><span class="ti-sep">&#9679;</span>`;
  }
  el.innerHTML=html+html; // duplicate for seamless loop
}

/* === KODAQ league v3: groups by tx, prefers non-Plot names === */
function renderLeague(data) {
  var el = document.getElementById('league');
  if (!el) return;
  var ethUsd = (data && data.eth_usd) || 0;
  var COL_LABEL = {otherdeed: 'OD', expanded: 'ODE'};
  function catType(cat) {
    if (cat === 'Artifact') return 'art';
    if (cat === 'Koda') return 'koda';
    if (cat === 'Plot') return 'plot';
    if (/Resource/.test(cat) && !/Tier/.test(cat)) return 'res';
    return 'trait';
  }
  var TYPE_LABEL = {res:'RES', art:'ART', koda:'KODA', plot:'PLOT', trait:'TRT'};
  var all = [];
  ['otherdeed','expanded'].forEach(function(c) {
    if (!data[c] || !data[c].sales_traits) return;
    var st = data[c].sales_traits;
    Object.keys(st).forEach(function(cat) {
      Object.keys(st[cat]).forEach(function(item) {
        var v = st[cat][item];
        if (!v || typeof v !== 'object' || typeof v.price_eth !== 'number') return;
        all.push({coll: COL_LABEL[c], cat: cat, name: item, type: catType(cat), price: v.price_eth, ts: v.ts || 0});
      });
    });
  });
  // Group by ts within same collection (single-tx wallet bulk purchases share a ts)
  var groups = {};
  all.forEach(function(s) {
    var k = s.ts + '|' + s.coll;
    if (!groups[k]) groups[k] = {ts: s.ts, coll: s.coll, items: []};
    groups[k].items.push(s);
  });
  var rows = Object.keys(groups).map(function(k) {
    var g = groups[k];
    g.items.sort(function(a,b){ return b.price - a.price; });
    // Pick rep: prefer non-Plot named item (artifact/resource/koda) over numeric token IDs
    var named = null;
    for (var i = 0; i < g.items.length; i++) {
      var it = g.items[i];
      if (it.cat !== 'Plot' && !/^\d+$/.test(String(it.name)) && it.name && it.name.length > 1) {
        named = it; break;
      }
    }
    var rep = named || g.items[0];
    var totalEth = g.items.reduce(function(s,i){ return s + i.price; }, 0);
    var cats = []; var seen = {};
    g.items.forEach(function(i){ if (!seen[i.cat]) { seen[i.cat] = 1; cats.push(i.cat); } });
    return {ts: g.ts, coll: g.coll, rep: rep, count: g.items.length, totalEth: totalEth, cats: cats};
  });
  rows.sort(function(a,b){ return b.totalEth - a.totalEth; });
  var top = rows.slice(0, 20);
  function ago(ts) {
    if (!ts) return '--';
    var sec = Math.floor(Date.now()/1000) - ts;
    if (sec < 60) return sec + 's ago';
    if (sec < 3600) return Math.floor(sec/60) + 'm ago';
    if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
    return Math.floor(sec/86400) + 'd ago';
  }
  function repDisplay(rep) {
    // If non-numeric name, return as-is. If Plot+numeric, prefix.
    if (rep.cat === 'Plot' && /^\d+$/.test(String(rep.name))) return 'Plot #' + rep.name;
    if (/^\d+$/.test(String(rep.name))) return rep.cat + ' #' + rep.name;
    return rep.name;
  }
  var html = '<div class="league-table-wrap" style="padding:12px 18px;">';
  html += '<div class="league-hdr" style="font-size:22px;padding:14px 16px;letter-spacing:3px;">';
  html += '\u25B2 TOP 20 WALLET PURCHASES <span class="cat-sub" style="font-size:14px;">// GROUPED BY TX // BOTH COLLECTIONS // RANKED BY TOTAL ETH</span>';
  html += '</div>';
  html += '<table class="mkt-table league-table" style="width:100%;"><thead><tr>';
  html += '<th>RNK</th><th>ITEM</th><th>TYPE</th><th>CAT</th><th>BULK</th><th>COL</th>';
  html += '<th class="r">TOP PRICE</th><th class="r">TOTAL ETH</th><th class="r">USD</th><th class="r">SOLD</th>';
  html += '</tr></thead><tbody>';
  top.forEach(function(g, i) {
    var rank = i+1;
    var rankCls = 'rank-rest';
    if (rank===1) rankCls='rank-gold';
    else if (rank===2) rankCls='rank-silver';
    else if (rank===3) rankCls='rank-bronze';
    var usdNum = g.totalEth * ethUsd;
    var usd = usdNum >= 1000 ? '$' + (usdNum/1000).toFixed(1) + 'K' : '$' + usdNum.toFixed(0);
    var catLabel = g.cats.length > 1 ? g.cats[0] + ' +' + (g.cats.length-1) : (g.cats[0] || '');
    var countBadge = g.count > 1 ? ('<span class="lg-count">x' + g.count + '</span>') : '';
    var displayName = repDisplay(g.rep);
    html += '<tr>';
    html += '<td><span class="' + rankCls + '">#' + rank + '</span></td>';
    html += '<td><span class="col-name">' + displayName + '</span>' + countBadge + '</td>';
    html += '<td><span class="col-badge type-' + g.rep.type + '">' + (TYPE_LABEL[g.rep.type]||'OBJ') + '</span></td>';
    html += '<td><span class="cat-name">' + catLabel + '</span></td>';
    html += '<td><span class="lg-total">' + g.count + ' ITEM' + (g.count>1?'S':'') + '</span></td>';
    html += '<td><span class="col-badge">' + g.coll + '</span></td>';
    html += '<td class="r"><span class="eth-val">' + g.rep.price.toFixed(4) + ' \u039E</span></td>';
    html += '<td class="r"><span class="eth-val">' + g.totalEth.toFixed(4) + ' \u039E</span></td>';
    html += '<td class="r"><span class="usd-val">' + usd + '</span></td>';
    html += '<td class="r"><span class="usd-val">' + ago(g.ts) + '</span></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  el.innerHTML = html;
}
/* === end league v3 === */

/* === KODAQ artifacts v2: floor-primary stacked layout, sorted low->high === */
function renderArtifacts(data) {
  var el = document.getElementById('artifacts');
  if (!el) return;
  var ethUsd = (data && data.eth_usd) || 0;

    html += '<table class="mkt-table art-v2"><thead><tr>';
    html += '<th>ARTIFACT</th><th class="r">FLOOR</th><th class="r">VS LAST SALE</th>';
    html += '</tr></thead><tbody>';
    rows.forEach(function(r) {

      html += '<div class="usd-val art-floor-usd">' + fmtUsd(r.floorUsd) + '</div></td>';

      html += '</tr>';

/* === KODAQ INVEST analyzer v1 === */
function renderInvest(data) {
  var el = document.getElementById('invest');
  if (!el) return;
  var ethUsd = (data && data.eth_usd) || 0;
  function fmtUsd(v) { return v >= 1000 ? '$' + (v/1000).toFixed(1) + 'K' : '$' + Math.round(v); }
  function ago(ts) {
    if (!ts) return '--';
    var sec = Math.floor(Date.now()/1000) - ts;
    if (sec < 3600) return Math.floor(sec/60) + 'm';
    if (sec < 86400) return Math.floor(sec/3600) + 'h';
    return Math.floor(sec/86400) + 'd';
  }
  function scoreOf(floor, lastSale, depth, salesCount) {
    var discount = lastSale ? Math.max(0, (lastSale - floor) / lastSale * 100) : 0;
    var scarcity = 100 / (1 + depth) * 5;
    var liquidity = Math.min(20, salesCount * 4);
    var affordability = Math.max(0, 100 - floor * 50);
    return discount * 0.45 + scarcity * 0.20 + liquidity * 0.20 + affordability * 0.15;
  }
  function buildPanel(coll, label) {
    var d = data[coll] || {};
    var raw = d.raw_traits || {};
    var sales = d.sales_traits || {};
    var resourceFloors = d.resource_floors || {};
    var rows = [];
    // RESOURCES: aggregate across direction x tier
    var resByName = {};
    Object.keys(resourceFloors).forEach(function(direction) {
      var dirData = resourceFloors[direction] || {};
      Object.keys(dirData).forEach(function(resName) {
        var tiers = dirData[resName] || {};
        Object.keys(tiers).forEach(function(tier) {
          var price = tiers[tier];
          if (typeof price !== 'number') return;
          if (!resByName[resName]) resByName[resName] = {floors: [], dirs: {}, tiers: {}};
          resByName[resName].floors.push(price);
          resByName[resName].dirs[direction] = 1;
          resByName[resName].tiers[tier] = 1;
        });
      });
    });
    Object.keys(resByName).forEach(function(name) {
      var r = resByName[name];
      var floor = Math.min.apply(null, r.floors);
      var depth = r.floors.length;
      // Last sale across all 4 resource directions
      var lastSale = null, lastSaleTs = null, salesCount = 0;
      ['Eastern Resource','Western Resource','Northern Resource','Southern Resource'].forEach(function(cat) {
        var s = sales[cat] && sales[cat][name];
        if (s && typeof s === 'object' && typeof s.price_eth === 'number') {
          if (!lastSaleTs || s.ts > lastSaleTs) { lastSale = s.price_eth; lastSaleTs = s.ts; }
          salesCount++;
        }
      });
      rows.push({type:'RES', name:name, floor:floor, depth:depth, lastSale:lastSale, lastSaleTs:lastSaleTs, salesCount:salesCount, score: scoreOf(floor, lastSale, depth, salesCount)});
    });
    // ARTIFACTS: each has one floor entry
    var artifacts = raw.Artifact || {};
    var artifactSales = sales.Artifact || {};
    Object.keys(artifacts).forEach(function(name) {
      var floor = artifacts[name];
      if (typeof floor !== 'number') return;
      var s = artifactSales[name];
      var lastSale = s && typeof s === 'object' ? s.price_eth : null;
      var lastSaleTs = s && typeof s === 'object' ? s.ts : null;
      var salesCount = lastSale ? 1 : 0;
      rows.push({type:'ART', name:name, floor:floor, depth:1, lastSale:lastSale, lastSaleTs:lastSaleTs, salesCount:salesCount, score: scoreOf(floor, lastSale, 1, salesCount)});
    });
    rows.sort(function(a,b){ return b.score - a.score; });
    var html = '<div class="invest-panel">';
    html += '<div class="col-hdr"><span class="col-name">' + label + '</span> ';
    html += '<span class="col-stat">' + rows.length + ' ASSETS</span></div>';
    html += '<div class="art-hdr">PAYLOAD OPPORTUNITIES <span class="cat-sub">RANKED BY OPPORTUNITY SCORE // LOW SUPPLY + DISCOUNT VS LAST SALE + LIQUIDITY</span></div>';
    html += '<table class="mkt-table invest-v1"><thead><tr>';
    html += '<th>RNK</th><th>ASSET</th><th>TYPE</th><th class="r">SUPPLY</th><th class="r">FLOOR</th><th class="r">VS LAST SALE</th><th class="r">SCORE</th>';
    html += '</tr></thead><tbody>';
    rows.forEach(function(r, i) {
      var rank = i + 1;
      var rankCls = 'rank-rest';
      if (rank <= 3) rankCls = 'rank-gold';
      else if (rank <= 5) rankCls = 'rank-silver';
      else if (rank <= 10) rankCls = 'rank-bronze';
      var saleCell = '<span class="no-data">no recent sale</span>';
      if (r.lastSale) {
        var diff = r.floor - r.lastSale;
        var pct = (diff / r.floor) * 100;
        var cls, arrow, sign;
        if (pct > 0.5) { cls = 'chg-up'; arrow = '\u25B2'; sign = '+'; }
        else if (pct < -0.5) { cls = 'chg-dn'; arrow = '\u25BC'; sign = ''; }
        else { cls = 'chg-eq'; arrow = '\u2014'; sign = ''; }
        saleCell = '<span class="' + cls + '">' + arrow + ' ' + r.lastSale.toFixed(4) + ' \u039E (' + sign + pct.toFixed(1) + '%)</span> <span class="usd-val" style="font-size:0.85em">' + ago(r.lastSaleTs) + '</span>';
      }
      var typeBadge = '<span class="col-badge type-' + (r.type==='RES'?'res':'art') + '">' + r.type + '</span>';
      var scoreCls = r.score >= 50 ? 'sale-up' : r.score >= 25 ? 'eth-val' : 'no-data';
      html += '<tr>';
      html += '<td><span class="' + rankCls + '">#' + rank + '</span></td>';
      html += '<td><span class="col-name">' + r.name + '</span></td>';
      html += '<td>' + typeBadge + '</td>';
      html += '<td class="r"><span class="lg-total">' + r.depth + (r.depth > 1 ? ' listings' : ' listing') + '</span></td>';
      html += '<td class="r"><div class="eth-val art-floor-big">' + r.floor.toFixed(4) + ' \u039E</div>';
      html += '<div class="usd-val art-floor-usd">' + fmtUsd(r.floor * ethUsd) + '</div></td>';
      html += '<td class="r">' + saleCell + '</td>';
      html += '<td class="r"><span class="' + scoreCls + '">' + r.score.toFixed(1) + '</span></td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    return html;
  }
  var od = buildPanel('otherdeed', 'OTHERDEED FOR OTHERSIDE');
  var ode = buildPanel('expanded', 'OTHERDEED EXPANDED');
  el.innerHTML = '<div class="col-grid">' + od + ode + '</div>' + (window.__investFAQHTML||'');
}

      });
    }
    entries.sort(function(a,b){ return b.ts - a.ts; });
    entries = entries.slice(0, 28);
    if (!entries.length) return;
    function buildHtml() {
      return entries.map(function(e){
        return '<span class="ti"><span class="ti-name">' + String(e.name).toUpperCase() + '</span> <span class="ti-price">' + e.price.toFixed(4) + ' \u039E</span></span>';
      }).join('<span class="ti-sep">\u25CF</span>');
    }
    var html = buildHtml();
    var inner = document.getElementById('ticker-inner');
    if (inner) inner.innerHTML = html + '<span class="ti-sep">\u25CF</span>' + html;
  }
  // ensure data is loaded
  function ensureDataThenBuild() {
    if (window.__lastData) { rebuildTicker(); return; }
    fetch('price_snapshot_latest.json?cb='+Date.now()).then(function(r){return r.json();}).then(function(d){
      window.__lastData = d;
      rebuildTicker();
    }).catch(function(){});
  }
  setTimeout(ensureDataThenBuild, 1500);
  setTimeout(ensureDataThenBuild, 3500);
  setInterval(ensureDataThenBuild, 60*1000);
  document.addEventListener('click', function(e){
    var t = e.target && e.target.closest && e.target.closest('[data-tab]');
    if (!t) return;
    setTimeout(rebuildTicker, 80);
    setTimeout(rebuildTicker, 400);
  });
})();
/* === END v10 JS === */

</script>
</body>
</html>
