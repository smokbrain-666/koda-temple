name: Update Otherdeed Prices

on:
  schedule:
        - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:        # also allow manual trigger from GitHub UI

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Otherdeed prices
        env:
          OPENSEA_API_KEY: ${{ secrets.OPENSEA_API_KEY }}
        run: python koda_temple_data.py

      - name: Commit and push prices
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Koda Temple Oracle"
          git add price_snapshot_latest.json price_snapshot_*.json
          git diff --staged --quiet || git commit -m "chore: update price snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
